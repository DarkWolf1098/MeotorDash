<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekenen Plus</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <script src="../JS/game.js" defer></script>
</head>
<body>

    <div id="score">Score: 0</div>

<input type="number" id="numberInput" class="number-input" pattern="[0-9]*" inputmode="numeric" placeholder="Enter answer" min="0" max="999" autocomplete="off"></input>

    <button id="restart-btn" class="hidden">Restart</button>
